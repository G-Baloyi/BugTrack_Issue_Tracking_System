<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTrack — Edit Issue</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <script src="login.js"></script>
    <script src="storage.js"></script>
    <script src="shared.js"></script>
    <script>
        checkAuth();
        const urlParams = new URLSearchParams(window.location.search);
        const issueId = parseInt(urlParams.get("id"));
        const issue = getIssues().find(i => i.id === issueId);
        const people = getPeople();
        const projects = getProjects();
        const pOpts = (sel) => people.map(p => `<option value="${p.id}" ${sel == p.id ? "selected" : ""}>${p.name} ${p.surname}</option>`).join("");
        const projOpts = projects.map(p => `<option value="${p.id}" ${p.id == issue?.projectId ? "selected" : ""}>${p.name}</option>`).join("");

        if (!issue) {
            buildShell("all-issues", `<div class="page-header"><h1 class="page-title">Issue not found</h1></div><a href="view-all-issues.html" class="btn btn-ghost">Back</a>`);
        } else {
            buildShell("all-issues", `
                <div class="page-header">
                    <div class="page-title-group">
                        <h1 class="page-title">Edit Issue <span class="id-badge">#${issue.id}</span></h1>
                        <p class="page-subtitle">${escapeHtml(issue.summary)}</p>
                    </div>
                    <a href="view-all-issues.html" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back</a>
                </div>
                <div class="form-card" style="max-width:800px;">
                    <h2 class="form-section-title"><i class="fas fa-edit"></i> Update Issue</h2>
                    <div class="form-grid form-grid-1">
                        <div class="field"><label>Summary *</label><input type="text" id="summary" value="${escapeHtml(issue.summary)}"></div>
                    </div>
                    <div class="form-grid form-grid-1">
                        <div class="field"><label>Description</label><textarea id="description" rows="4">${escapeHtml(issue.description)}</textarea></div>
                    </div>
                    <div class="form-grid">
                        <div class="field"><label>Reported By</label><select id="identifiedBy"><option value="">Select person</option>${pOpts(issue.identifiedBy)}</select></div>
                        <div class="field"><label>Date Identified</label><input type="date" id="dateIdentified" value="${issue.dateIdentified || ""}"></div>
                    </div>
                    <div class="form-grid">
                        <div class="field"><label>Priority</label>
                            <select id="priority">
                                <option value="low" ${issue.priority==="low"?"selected":""}>Low</option>
                                <option value="medium" ${issue.priority==="medium"?"selected":""}>Medium</option>
                                <option value="high" ${issue.priority==="high"?"selected":""}>High</option>
                            </select>
                        </div>
                        <div class="field"><label>Project</label><select id="project"><option value="">Select project</option>${projOpts}</select></div>
                    </div>
                    <div class="form-grid">
                        <div class="field"><label>Assign To</label><select id="assignee"><option value="">Unassigned</option>${pOpts(issue.assignedTo)}</select></div>
                        <div class="field"><label>Status</label>
                            <select id="status">
                                <option value="open" ${issue.status==="open"?"selected":""}>Open</option>
                                <option value="resolved" ${issue.status==="resolved"?"selected":""}>Resolved</option>
                                <option value="overdue" ${issue.status==="overdue"?"selected":""}>Overdue</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="field"><label>Target Resolution Date</label><input type="date" id="targetDate" value="${issue.targetResoDate || ""}"></div>
                        <div class="field"><label>Actual Resolution Date</label><input type="date" id="actualDate" value="${issue.actualResoDate || ""}"></div>
                    </div>
                    <div class="form-grid form-grid-1">
                        <div class="field"><label>Resolution Summary</label><textarea id="resoSummary" rows="2" placeholder="How was this issue resolved?">${escapeHtml(issue.resoSummary || "")}</textarea></div>
                    </div>
                    <div class="form-actions">
                        <button class="btn btn-danger" onclick="deleteIssue()"><i class="fas fa-trash"></i> Delete</button>
                        <a href="view-all-issues.html" class="btn btn-ghost"><i class="fas fa-times"></i> Cancel</a>
                        <button class="btn btn-primary" onclick="saveIssue()"><i class="fas fa-save"></i> Save Changes</button>
                    </div>
                </div>
            `);
        }

        function saveIssue() {
            const summary = document.getElementById("summary").value.trim();
            if (!summary) { showToast("Summary is required", "error"); return; }
            const issues = getIssues();
            const idx = issues.findIndex(i => i.id === issueId);
            if (idx === -1) return;
            issues[idx] = {
                ...issues[idx],
                summary: summary,
                description: document.getElementById("description").value,
                identifiedBy: parseInt(document.getElementById("identifiedBy").value) || null,
                dateIdentified: document.getElementById("dateIdentified").value,
                projectId: parseInt(document.getElementById("project").value),
                assignedTo: parseInt(document.getElementById("assignee").value) || null,
                status: document.getElementById("status").value,
                priority: document.getElementById("priority").value,
                targetResoDate: document.getElementById("targetDate").value,
                actualResoDate: document.getElementById("actualDate").value,
                resoSummary: document.getElementById("resoSummary").value,
                updatedAt: new Date().toISOString()
            };
            saveIssues(issues);
            showToast("Issue updated");
            setTimeout(() => window.location.href = "view-all-issues.html", 800);
        }

        function deleteIssue() {
            if (!confirm(`Delete issue #${issueId}? This cannot be undone.`)) return;
            const issues = getIssues().filter(i => i.id !== issueId);
            saveIssues(issues);
            showToast("Issue deleted");
            setTimeout(() => window.location.href = "view-all-issues.html", 600);
        }

        window.saveIssue = saveIssue;
        window.deleteIssue = deleteIssue;
    </script>
</body>
</html>
