<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTrack - View Issue</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-app">
        <nav class="navbar-modern">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="logo">
                        <h2><i class="fas fa-bug"></i> BugTrack</h2>
                    </div>
                    <div class="user-info">
                        <span class="user-name" id="currentUserName"><i class="fas fa-user-circle"></i> Admin</span>
                        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container mt-4 main-container">
            <div class="row main-row">
                <div class="col-md-3">
                    <div class="sidebar-modern">
                        <div class="nav flex-column">
                            <a href="dashboard.html" class="nav-item-custom"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                            <a href="create-issue.html" class="nav-item-custom"><i class="fas fa-plus-circle"></i> Create Issue</a>
                            <a href="view-all-issues.html" class="nav-item-custom active"><i class="fas fa-list-ul"></i> All Issues</a>
                            <a href="my-issues.html" class="nav-item-custom"><i class="fas fa-user-check"></i> My Issues</a>
                            <a href="people.html" class="nav-item-custom"><i class="fas fa-users"></i> People</a>
                            <a href="projects.html" class="nav-item-custom"><i class="fas fa-project-diagram"></i> Projects</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-9 main-col">
                    <div class="main-content-area">
                        <div class="mb-3">
                            <a href="view-all-issues.html" class="btn btn-secondary btn-sm">
                                <i class="fas fa-arrow-left"></i> Back to All Issues
                            </a>
                        </div>
                        <div class="form-card" id="issueDetailCard">
                            <div class="empty-state">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Loading issue...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
    <script src="storage.js"></script>
    <script src="issues.js"></script>
    <script>
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
