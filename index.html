<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTrack — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body dark-mode">
    <div class="login-grid">
        <div class="login-brand">
            <div class="brand-content">
                <div class="brand-logo"><i class="fas fa-bug"></i></div>
                <h1 class="brand-name">BugTrack</h1>
                <p class="brand-tagline">Squash bugs. Ship faster.</p>
                <div class="brand-features">
                    <div class="brand-feat"><i class="fas fa-bolt"></i> Real-time tracking</div>
                    <div class="brand-feat"><i class="fas fa-users"></i> Team collaboration</div>
                    <div class="brand-feat"><i class="fas fa-chart-line"></i> Insights & analytics</div>
                </div>
            </div>
        </div>
        <div class="login-form-side">
            <div class="login-card">
                <h2>Welcome back</h2>
                <p class="login-sub">Sign in to your workspace</p>
                <div id="loginError" class="login-error" style="display:none;"></div>
                <form onsubmit="login(); return false;">
                    <div class="field-group">
                        <label>Username</label>
                        <div class="field-wrap"><i class="fas fa-user"></i><input type="text" id="username" placeholder="Enter username" autocomplete="username"></div>
                    </div>
                    <div class="field-group">
                        <label>Password</label>
                        <div class="field-wrap"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Enter password" autocomplete="current-password"></div>
                    </div>
                    <button type="submit" class="btn-signin"><i class="fas fa-arrow-right-to-bracket"></i> Sign In</button>
                </form>
                <div class="demo-hint"><i class="fas fa-info-circle"></i> Demo: <code>admin</code> / <code>admin001</code></div>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
